name: Analyze Daily Chess Games

on:
  workflow_dispatch:
    inputs:
      username:
        description: Chess.com username
        required: true
        default: DanielKetterer
        type: string
      date:
        description: Local YYYY-MM-DD to scan; leave blank for yesterday
        required: false
        default: ""
        type: string
  schedule:
    # Runs at 3am America/New_York during daylight-saving time.
    - cron: "0 7 * * *"

permissions:
  contents: write

concurrency:
  group: daily-chess-analysis-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze-daily:
    name: Analyze unreported games
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Download repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Stockfish 18
        run: |
          release_api="https://api.github.com/repos/official-stockfish/Stockfish/releases/tags/sf_18"
          curl -fsSL "$release_api" -o /tmp/stockfish-release.json
          asset_url=$(python - <<'PY'
          import json
          from pathlib import Path

          release = json.loads(Path("/tmp/stockfish-release.json").read_text())
          for asset in release["assets"]:
              name = asset["name"]
              if "ubuntu" in name and "x86-64-avx2" in name and name.endswith(".tar"):
                  print(asset["browser_download_url"])
                  break
          else:
              raise SystemExit("Stockfish 18 Ubuntu x86-64 AVX2 asset not found")
          PY
          )
          curl -fsSL "$asset_url" -o /tmp/stockfish.tar
          mkdir -p /tmp/stockfish
          tar -xf /tmp/stockfish.tar -C /tmp/stockfish
          stockfish_bin=$(find /tmp/stockfish -type f -name 'stockfish*' -perm -111 | head -n 1)
          sudo install -m 0755 "$stockfish_bin" /usr/local/bin/stockfish
          echo quit | /usr/local/bin/stockfish

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-chess pandas matplotlib

      - name: Find unanalyzed games
        env:
          USERNAME: ${{ inputs.username || 'DanielKetterer' }}
          LOCAL_DATE: ${{ inputs.date }}
        run: |
          args=(--username "$USERNAME" --timezone America/New_York --reports-dir reports)
          if [ -n "$LOCAL_DATE" ]; then
            args+=(--date "$LOCAL_DATE")
          fi
          python unanalyzed_games.py "${args[@]}" > games_to_analyze.txt
          cat games_to_analyze.txt

      - name: Analyze games
        env:
          STOCKFISH_PATH: /usr/local/bin/stockfish
          USERNAME: ${{ inputs.username || 'DanielKetterer' }}
        run: |
          mkdir -p reports analysis-output
          while IFS= read -r game_id; do
            [ -n "$game_id" ] || continue
            python chess_analyzer.py \
              --username "$USERNAME" \
              --game-id "$game_id" \
              --depth 24 \
              --findability honest \
              --perspective both \
              --out analysis-output/report.md \
              --graph analysis-output/report.png \
              --puzzles-file puzzles.json

            game_url=$(sed -n 's/^Game: //p' analysis-output/report_white.md | head -n 1)
            analyzed_game_id=${game_url%/}
            analyzed_game_id=${analyzed_game_id##*/}
            game_time=$(sed -n 's/^Game end time UTC: //p' analysis-output/report_white.md | head -n 1)
            game_date=$(sed -n 's/^Date: *//p' analysis-output/report_white.md | head -n 1 | cut -d '|' -f 1 | xargs)
            timestamp=$(date -u -d "${game_time:-${game_date:-now}}" +%Y%m%dT%H%M%SZ 2>/dev/null || date -u +%Y%m%dT%H%M%SZ)
            base="reports/${analyzed_game_id}_${timestamp}"
            mv analysis-output/report_white.md "${base}_white.md"
            mv analysis-output/report_black.md "${base}_black.md"
            mv analysis-output/report_white.png "${base}_white.png"
            mv analysis-output/report_black.png "${base}_black.png"
            mv analysis-output/report_white.json "${base}_white.json"
            mv analysis-output/report_black.json "${base}_black.json"
          done < games_to_analyze.txt

      - name: Commit reports to repository
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf analysis-output games_to_analyze.txt
          git add -f reports/ puzzles.json
          if git diff --cached --quiet; then
            echo "No new daily reports."
            exit 0
          fi
          git commit -m "Add daily chess analyses"
          git pull --rebase -X theirs origin "$BRANCH_NAME"
          git push origin "HEAD:$BRANCH_NAME"
