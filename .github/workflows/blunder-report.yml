name: Blunder Report

on:
  workflow_dispatch:
  push:
    paths:
      - "reports/**/*.md"
      - "blunder_report.py"

permissions:
  contents: write

concurrency:
  group: blunder-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  report:
    name: Build blunder report
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install matplotlib

      - name: Generate blunder report
        run: |
          python blunder_report.py \
            --reports-dir reports \
            --out blunder_report.md \
            --csv blunder_report.csv \
            --graph blunder_scatter.png

      - name: Commit blunder report to repository
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f blunder_report.md blunder_report.csv blunder_scatter.png

          if git diff --cached --quiet; then
            echo "Blunder report has not changed."
            exit 0
          fi

          git commit -m "Update blunder report"
          git pull --rebase -X theirs origin "$BRANCH_NAME"
          git push origin "HEAD:$BRANCH_NAME"
