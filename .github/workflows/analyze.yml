name: Analyze Chess Game

on:
  workflow_dispatch:
    inputs:
      username:
        description: Chess.com username
        required: true
        default: DanielKetterer
        type: string

      game_id:
        description: Game ID or URL; leave blank for latest game
        required: false
        default: ""
        type: string

      depth:
        description: Stockfish analysis depth
        required: true
        default: "24"
        type: choice
        options:
          - "10"
          - "18"
          - "24"
          - "30"

      findability:
        description: Findability analysis method
        required: true
        default: honest
        type: choice
        options:
          - heuristic
          - honest

# Allows the workflow to commit generated reports.
permissions:
  contents: write

# Prevents two analyses from updating the same branch simultaneously.
concurrency:
  group: chess-analysis-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Run chess analysis
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Download repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Stockfish
        run: |
          sudo apt-get update
          sudo apt-get install -y stockfish

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-chess pandas matplotlib

      - name: Analyze game
        env:
          STOCKFISH_PATH: /usr/games/stockfish
          USERNAME: ${{ inputs.username }}
          GAME_ID: ${{ inputs.game_id }}
          DEPTH: ${{ inputs.depth }}
          FINDABILITY: ${{ inputs.findability }}
        run: |
          mkdir -p reports
          args=(
            --username "$USERNAME"
            --depth "$DEPTH"
            --findability "$FINDABILITY"
            --perspective both
            --out reportLatest.md
            --graph reportLatest.png
          )

          if [ -n "$GAME_ID" ]; then
            args+=(--game-id "$GAME_ID")
          fi

          python chess_analyzer.py "${args[@]}"

          game_url=$(sed -n 's/^Game: //p' reportLatest_white.md | head -n 1)
          analyzed_game_id=${game_url%/}
          analyzed_game_id=${analyzed_game_id##*/}
          game_time=$(sed -n 's/^Game end time UTC: //p' reportLatest_white.md | head -n 1)
          game_date=$(sed -n 's/^Date: *//p' reportLatest_white.md | head -n 1 | cut -d '|' -f 1 | xargs)
          timestamp=$(date -u -d "${game_time:-${game_date:-now}}" +%Y%m%dT%H%M%SZ 2>/dev/null || date -u +%Y%m%dT%H%M%SZ)
          base="reports/${analyzed_game_id}_${timestamp}"

          mv reportLatest_white.md "${base}_white.md"
          mv reportLatest_black.md "${base}_black.md"
          mv reportLatest_white.png "${base}_white.png"
          mv reportLatest_black.png "${base}_black.png"

      - name: Commit reports to repository
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f reports/

          if git diff --cached --quiet; then
            echo "Reports have not changed."
            exit 0
          fi

          git commit -m "Add timestamped chess analysis"

          # Incorporate commits made while Stockfish was running.
          git pull --rebase -X theirs origin "$BRANCH_NAME"

          git push origin "HEAD:$BRANCH_NAME"
