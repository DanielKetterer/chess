name: Analyze Chess Game

on:
  workflow_dispatch:
    inputs:
      username:
        description: Chess.com username
        required: true
        default: DanielKetterer
        type: string

      game_id:
        description: Game ID or URL; leave blank for latest game
        required: false
        default: ""
        type: string

      depth:
        description: Stockfish analysis depth
        required: true
        default: "10"
        type: choice
        options:
          - "10"
          - "18"
          - "24"
          - "30"

      findability:
        description: Findability analysis method
        required: true
        default: honest
        type: choice
        options:
          - heuristic
          - honest

permissions:
  contents: read

jobs:
  analyze:
    name: Run chess analysis
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Stockfish
        run: |
          sudo apt-get update
          sudo apt-get install -y stockfish

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-chess pandas matplotlib markdown

      - name: Analyze game
        env:
          STOCKFISH_PATH: /usr/games/stockfish
          USERNAME: ${{ inputs.username }}
          GAME_ID: ${{ inputs.game_id }}
          DEPTH: ${{ inputs.depth }}
          FINDABILITY: ${{ inputs.findability }}
        run: |
          args=(
            --username "$USERNAME"
            --depth "$DEPTH"
            --findability "$FINDABILITY"
            --perspective both
            --out reportLatest.md
            --graph reportLatest.png
          )

          if [ -n "$GAME_ID" ]; then
            args+=(--game-id "$GAME_ID")
          fi

          python chess_analyzer.py "${args[@]}"

      - name: Convert reports to HTML
        run: |
          python -m markdown -x tables \
            reportLatest_black.md > reportLatest_black.html

          python -m markdown -x tables \
            reportLatest_white.md > reportLatest_white.html

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: chess-analysis-${{ github.run_number }}
          path: |
            reportLatest_black.html
            reportLatest_white.html
            reportLatest_black.md
            reportLatest_white.md
            reportLatest_black.png
            reportLatest_white.png
          retention-days: 30
          if-no-files-found: error
