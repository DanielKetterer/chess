name: Puzzle tools

on:
  workflow_dispatch:
    inputs:
      mode:
        description: generate-any, generate-unprocessed, list, or complete
        required: true
        default: generate-unprocessed
        type: choice
        options: [generate-any, generate-unprocessed, list, complete]
      username:
        description: Chess.com username for generation
        required: false
      game_id:
        description: Optional Chess.com game id/url or puzzle FEN for complete mode
        required: false
      csv:
        description: Optional move-history CSV for generate-unprocessed mode
        required: false
      depth:
        description: Stockfish depth for generation
        required: false
        default: '24'
      puzzles_file:
        description: Puzzle JSON path
        required: false
        default: puzzles.json
      puzzle_selector:
        description: Optional puzzle index/FEN for list mode
        required: false
      attempted_move:
        description: Optional attempted move for complete mode
        required: false

jobs:
  puzzle-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y stockfish
          python -m pip install --upgrade pip
          python -m pip install python-chess pandas matplotlib
      - name: Run selected puzzle command
        env:
          STOCKFISH_PATH: /usr/games/stockfish
        run: |
          set -euo pipefail
          case "${{ inputs.mode }}" in
            generate-any)
              test -n "${{ inputs.username }}"
              mkdir -p reports
              extra=()
              if [ -n "${{ inputs.game_id }}" ]; then extra=(--game-id "${{ inputs.game_id }}"); fi
              python chess_analyzer.py --username "${{ inputs.username }}" "${extra[@]}" --depth "${{ inputs.depth }}" --findability honest --puzzles-file "${{ inputs.puzzles_file }}" --out reports/action_report.md --graph reports/action_graph.png
              ;;
            generate-unprocessed)
              mkdir -p reports
              if [ -n "${{ inputs.csv }}" ]; then
                python -c "import pandas as pd; df = pd.read_csv('${{ inputs.csv }}', dtype={'game_id': str}); [print(gid) for gid in df['game_id'].dropna().drop_duplicates()]" > /tmp/game_ids.txt
                while read -r gid; do
                  safe=$(echo "$gid" | tr -c 'A-Za-z0-9_.-' '_')
                  if compgen -G "reports/*${safe}*.json" > /dev/null; then continue; fi
                  python chess_analyzer.py --csv "${{ inputs.csv }}" --game-id "$gid" --depth "${{ inputs.depth }}" --findability honest --puzzles-file "${{ inputs.puzzles_file }}" --out "reports/${safe}.md" --graph "reports/${safe}.png"
                done < /tmp/game_ids.txt
              else
                test -n "${{ inputs.username }}"
                python chess_analyzer.py --username "${{ inputs.username }}" --depth "${{ inputs.depth }}" --findability honest --puzzles-file "${{ inputs.puzzles_file }}" --out reports/action_report.md --graph reports/action_graph.png
              fi
              ;;
            list)
              extra=()
              if [ -n "${{ inputs.puzzle_selector }}" ]; then extra=(--selector "${{ inputs.puzzle_selector }}"); fi
              python scripts/render_puzzle_md.py --puzzles-file "${{ inputs.puzzles_file }}" "${extra[@]}" --out puzzle.md
              cat puzzle.md
              ;;
            complete)
              test -n "${{ inputs.game_id }}"
              python scripts/mark_puzzle_attempt.py --puzzles-file "${{ inputs.puzzles_file }}" --fen "${{ inputs.game_id }}" --move "${{ inputs.attempted_move }}" --result completed
              ;;
          esac
      - uses: actions/upload-artifact@v4
        with:
          name: puzzle-output
          path: |
            puzzle.md
            puzzles.json
            reports/
          if-no-files-found: ignore
