name: Analyze Chess Game

on:
  workflow_dispatch:
    inputs:
      username:
        description: Chess.com username
        required: true
        default: DanielKetterer
        type: string

      game_id:
        description: Game ID or URL; leave blank for latest game
        required: false
        default: ""
        type: string

      depth:
        description: Stockfish analysis depth
        required: true
        default: "18"
        type: choice
        options:
          - "10"
          - "18"
          - "24"
          - "30"

      findability:
        description: Findability analysis method
        required: true
        default: heuristic
        type: choice
        options:
          - heuristic
          - honest

# Allows the workflow to commit generated reports.
permissions:
  contents: write

# Prevent two analyses from trying to update the same branch simultaneously.
concurrency:
  group: chess-analysis-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Run chess analysis
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Download repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Stockfish
        run: |
          sudo apt-get update
          sudo apt-get install -y stockfish

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-chess pandas matplotlib markdown

      - name: Analyze game
        env:
          STOCKFISH_PATH: /usr/games/stockfish
          USERNAME: ${{ inputs.username }}
          GAME_ID: ${{ inputs.game_id }}
          DEPTH: ${{ inputs.depth }}
          FINDABILITY: ${{ inputs.findability }}
        run: |
          args=(
            --username "$USERNAME"
            --depth "$DEPTH"
            --findability "$FINDABILITY"
            --perspective both
            --out reportLatest.md
            --graph reportLatest.png
          )

          if [ -n "$GAME_ID" ]; then
            args+=(--game-id "$GAME_ID")
          fi

          python chess_analyzer.py "${args[@]}"

      - name: Convert reports to HTML
        run: |
          python -m markdown -x tables \
            reportLatest_black.md > reportLatest_black.html

          python -m markdown -x tables \
            reportLatest_white.md > reportLatest_white.html

      - name: Commit reports to repository
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f \
            reportLatest_black.html \
            reportLatest_white.html \
            reportLatest_black.md \
            reportLatest_white.md \
            reportLatest_black.png \
            reportLatest_white.png

          if git diff --cached --quiet; then
            echo "Reports have not changed."
            exit 0
          fi

          git commit -m "Update latest chess analysis"
          git push origin "HEAD:$BRANCH_NAME"
