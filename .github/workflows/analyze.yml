name: Analyze Chess Game

on:
  workflow_dispatch:
    inputs:
      username:
        description: Chess.com username
        required: true
        default: DanielKetterer

      game_id:
        description: Game ID or URL; leave blank for latest game
        required: false
        default: ""

      depth:
        description: Stockfish depth
        required: true
        type: choice
        options:
          - "10"
          - "18"
          - "24"
          - "30"
        default: "18"

      findability:
        description: Findability analysis
        required: true
        type: choice
        options:
          - heuristic
          - honest
        default: heuristic

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Stockfish
        run: |
          sudo apt-get update
          sudo apt-get install -y stockfish

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-chess pandas matplotlib

      - name: Analyze game
        env:
          STOCKFISH_PATH: /usr/games/stockfish
          USERNAME: ${{ inputs.username }}
          GAME_ID: ${{ inputs.game_id }}
          DEPTH: ${{ inputs.depth }}
          FINDABILITY: ${{ inputs.findability }}
        run: |
          args=(
            --username "$USERNAME"
            --depth "$DEPTH"
            --findability "$FINDABILITY"
            --perspective both
            --out analysis.md
            --graph evaluation.png
          )

          if [ -n "$GAME_ID" ]; then
            args+=(--game-id "$GAME_ID")
          fi

          python chess_analyzer.py "${args[@]}"

      - name: Upload reports and graphs
        uses: actions/upload-artifact@v4
        with:
          name: chess-analysis-${{ github.run_number }}
          path: |
            analysis_white.md
            analysis_black.md
            evaluation_white.png
            evaluation_black.png
          retention-days: 30
